<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>LoopMart - Buy and Sell Anything in Nigeria | Online Marketplace</title>
    <meta name="title" content="LoopMart - Buy and Sell Anything in Nigeria | Online Marketplace">
    <meta name="description" content="LoopMart is Nigeria's fastest growing online marketplace. Buy and sell gadgets, vehicles, houses, fashion items, and more. Connect with verified sellers safely.">
    <meta name="keywords" content="LoopMart, online marketplace, buy and sell Nigeria, gadgets, vehicles, houses, fashion, e-commerce Nigeria, verified sellers">
    <meta name="author" content="LoopMart">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://loopmart.ng/">
    <meta property="og:title" content="LoopMart - Buy and Sell Anything in Nigeria">
    <meta property="og:description" content="Nigeria's fastest growing online marketplace. Buy and sell gadgets, vehicles, houses, fashion items, and more.">
    <meta property="og:image" content="https://loopmart.ng/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://loopmart.ng/">
    <meta property="twitter:title" content="LoopMart - Buy and Sell Anything in Nigeria">
    <meta property="twitter:description" content="Nigeria's fastest growing online marketplace. Buy and sell gadgets, vehicles, houses, fashion items, and more.">
    <meta property="twitter:image" content="https://loopmart.ng/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/loopmart-logo.png">
    <link rel="shortcut icon" href="/loopmart-logo.png">
    <link rel="apple-touch-icon" href="/loopmart-logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/loopmart-logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/loopmart-logo.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="msapplication-TileColor" content="#4B0082">
    <meta name="theme-color" content="#4B0082">

    <!-- Additional SEO -->
    <meta name="geo.region" content="NG">
    <meta name="geo.placename" content="Nigeria">
    <meta name="format-detection" content="telephone=no">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://loopmart.ng/">

    <!-- Preconnect to important domains -->
    <link rel="preconnect" href="https://loopmart.ng">
    <link rel="preconnect" href="https://api.loopmart.ng">
  </head>
  <body>
    <div id="root"></div>
    
    <script>
      (function() {
        console.log('🔍 Token handler running');
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        console.log('Current URL:', window.location.href);
        console.log('Token found:', token ? 'YES' : 'NO');
        
        if (token) {
          console.log('✅ Token detected! Storing in localStorage');
          localStorage.setItem('loopmart_token', token);
          
          // Clear the URL
          const newUrl = window.location.origin + window.location.pathname;
          window.history.replaceState({}, document.title, newUrl);
          console.log('🧹 Token removed from URL');
          
          // Fetch user data with the token
          const API_URL = 'https://loopmart.ng/api';
          
          fetch(`${API_URL}/v1/user`, {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Accept': 'application/json'
            }
          })
          .then(response => {
            console.log('📨 User fetch response status:', response.status);
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
          })
          .then(data => {
            console.log('👤 User data received:', data);
            
            // Extract user data from response (the API returns data.user)
            let userData = data.data?.user || data.user || data;
            
            // Store user data in localStorage
            localStorage.setItem('loopmart_user', JSON.stringify(userData));
            console.log('💾 User data stored');
            
            // Reload to update header
            setTimeout(() => {
              window.location.reload();
            }, 500);
          })
          .catch(error => {
            console.error('❌ Error fetching user data:', error);
          });
        }
      })();
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
